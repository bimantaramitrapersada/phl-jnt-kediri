<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - BIMANTARA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: Arial; background: #f0f2f5; min-height: 100vh; 
      display: flex; align-items: center; justify-content: center; padding: 20px; 
    }
    .box { 
      background: white; border-radius: 16px; padding: 28px; 
      max-width: 460px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
    }
    h1 { text-align: center; color: #1e3c72; }
    .sub { text-align: center; color: #666; margin-bottom: 20px; font-size: 13px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input { 
      width: 100%; padding: 14px; border: 2px solid #e0e0e0; 
      border-radius: 8px; font-size: 15px; margin-bottom: 12px; 
    }
    input:focus { outline: none; border-color: #2a5298; }
    .upload-box { 
      border: 2px dashed #ccc; border-radius: 8px; padding: 20px; 
      text-align: center; cursor: pointer; margin-bottom: 12px;
    }
    .upload-box:hover { border-color: #2a5298; background: #f8f9ff; }
    .upload-box.has-file { border-color: #28a745; background: #f0fff4; }
    .upload-box input { display: none; margin: 0; }
    .preview { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    .btn { 
      width: 100%; padding: 16px; border: none; border-radius: 10px; 
      font-size: 16px; font-weight: 700; cursor: pointer; 
      background: #1e3c72; color: white; 
    }
    .btn:disabled { background: #ccc; }
    .info { 
      padding: 12px; border-radius: 8px; background: #f0f0f0; 
      margin: 12px 0; font-size: 14px; text-align: center; 
      min-height: 20px; white-space: pre-line; 
    }
    .info.success { background: #d4edda; color: #155724; }
    .info.error { background: #f8d7da; color: #721c24; }
    .link { text-align: center; margin-top: 16px; font-size: 14px; }
    .link a { color: #2a5298; text-decoration: none; font-weight: 600; }
    .required { color: red; }
  </style>
</head>
<body>
  <div class="box">
    <h1>📝 PENDAFTARAN</h1>
    <p class="sub">ABSENSI BIMANTARA</p>
    
    <label>NIK <span class="required">*</span></label>
    <input type="text" id="nik" placeholder="Nomor Induk Karyawan" required>
    
    <label>Nama Lengkap <span class="required">*</span></label>
    <input type="text" id="nama" placeholder="Nama lengkap" required>
    
    <label>No. HP / WhatsApp <span class="required">*</span></label>
    <input type="tel" id="noHp" placeholder="08xxx" required>
    
    <label>Foto KTP <span class="required">* WAJIB</span></label>
    <div class="upload-box" id="ktpBox" onclick="document.getElementById('fotoKtp').click()">
      <input type="file" id="fotoKtp" accept="image/*" capture="environment">
      <p id="ktpText">📷 Klik untuk ambil/upload foto KTP</p>
      <img id="ktpPreview" class="preview" style="display:none">
    </div>
    
    <div class="info" id="info"></div>
    
    <button class="btn" id="btnSubmit">✅ DAFTAR</button>
    <p class="link">Sudah terdaftar? <a href="index.html">Absen di sini</a></p>
  </div>
  
  <script src="config.js"></script>
  <script src="helpers.js"></script>
  <script>
    let fotoBase64 = null;
    
    document.getElementById('fotoKtp').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5*1024*1024) { alert('Max 5MB'); return; }
      try {
        const r = await resizeFotoFromFile(file, 1200, 0.8);
        fotoBase64 = r.base64;
        document.getElementById('ktpPreview').src = r.dataUrl;
        document.getElementById('ktpPreview').style.display = 'block';
        document.getElementById('ktpText').innerText = '✅ Foto KTP siap';
        document.getElementById('ktpBox').classList.add('has-file');
      } catch (err) { alert('Error: ' + err.message); }
    });
    
    document.getElementById('btnSubmit').addEventListener('click', async () => {
      const nik = document.getElementById('nik').value.trim();
      const nama = document.getElementById('nama').value.trim();
      const noHp = document.getElementById('noHp').value.trim();
      const info = document.getElementById('info');
      if (!nik || !nama || !noHp) { 
        setInfo(info, '❌ Lengkapi semua field!', 'error'); 
        return; 
      }
      if (!fotoBase64) { 
        setInfo(info, '❌ Foto KTP WAJIB diupload!', 'error'); 
        return; 
      }
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true; btn.innerText = '⏳ Mengirim...';
      try {
        const r = await kirimKeServer({ 
          action: 'register', nik, nama, noHp, fotoKtpBase64: fotoBase64 
        });
        if (r.status === 'success') {
          setInfo(info, r.message + '\n\n🔄 Mengalihkan...', 'success');
          saveLastNIK(nik);
          setTimeout(() => location.href = 'index.html', 2500);
        } else { throw new Error(r.message); }
      } catch (err) {
        setInfo(info, '❌ ' + err.message, 'error');
        btn.disabled = false; btn.innerText = '✅ DAFTAR';
      }
    });
  </script>
</body>
</html>
