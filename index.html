<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABSENSI JNT KEDIRI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh; padding: 16px; 
      display: flex; align-items: center; justify-content: center;
    }
    .box { 
      background: white; border-radius: 16px; padding: 24px; 
      max-width: 460px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; color: #1e3c72; font-size: 22px; margin-bottom: 4px; }
    .sub { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    input { 
      width: 100%; padding: 14px; border: 2px solid #e0e0e0; 
      border-radius: 8px; font-size: 16px; 
    }
    input:focus { outline: none; border-color: #2a5298; }
    .info { 
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; padding: 14px; border-radius: 10px; 
      margin-bottom: 16px; text-align: center;
    }
    .info .nama { font-size: 18px; font-weight: bold; }
    .info .nik { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    .shift-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 16px 0; }
    .shift-btn { 
      padding: 12px 8px; border: 2px solid #e0e0e0; background: white; 
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; 
      text-align: center; transition: 0.2s;
    }
    .shift-btn.active { background: #2a5298; color: white; border-color: #2a5298; }
    .shift-btn small { display: block; font-size: 10px; opacity: 0.8; font-weight: normal; margin-top: 2px; }
    .btn { 
      width: 100%; padding: 16px; border: none; border-radius: 10px; 
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #ccc !important; cursor: not-allowed; }
    .btn-primary { background: #1e3c72; color: white; }
    .btn-masuk { background: #28a745; color: white; }
    .btn-pulang { background: #fd7e14; color: white; }
    .btn-gray { background: #999; color: white; }
    video, img.preview { 
      width: 100%; max-height: 400px; border-radius: 12px; 
      background: #000; object-fit: cover; display: block;
    }
    .info-box { 
      padding: 12px; border-radius: 8px; background: #f0f0f0; 
      margin: 12px 0; font-size: 14px; text-align: center; min-height: 20px; 
      white-space: pre-line;
    }
    .info-box.success { background: #d4edda; color: #155724; font-weight: 600; }
    .info-box.error { background: #f8d7da; color: #721c24; font-weight: 600; }
    .info-box.warning { background: #fff3cd; color: #856404; }
    .footer-link { text-align: center; margin-top: 16px; font-size: 14px; }
    .footer-link a { color: #2a5298; text-decoration: none; font-weight: 600; }
    .hidden { display: none !important; }
    .video-box { 
      position: relative; margin: 12px 0; 
      background: #000; border-radius: 12px; overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>ABSENSI JNT KEDIRI</h1>
    <p class="sub">Sistem Absensi Pekerja J&T Cargo</p>
    
    <!-- STEP 1: NIK/HP -->
    <div id="step1">
      <label>NIK atau No. HP</label>
      <input type="text" id="identifier" placeholder="Ketik NIK atau No HP" autocomplete="off">
      <button class="btn btn-primary" onclick="cekPegawai()">LANJUT →</button>
    </div>
    
    <!-- STEP 2: PILIH SHIFT -->
    <div id="step2" class="hidden">
      <div class="info">
        <div class="nama" id="dispNama">-</div>
        <div class="nik" id="dispNIK">-</div>
      </div>
      <label style="text-align:center;margin-bottom:10px;">Pilih Shift:</label>
      <div class="shift-group">
        <div class="shift-btn" data-shift="PAGI" onclick="pilihShift('PAGI')">
          🌅 PAGI
          <small>08:00-20:00</small>
        </div>
        <div class="shift-btn" data-shift="SORE" onclick="pilihShift('SORE')">
          🌇 SORE
          <small>17:00-05:00</small>
        </div>
        <div class="shift-btn" data-shift="MALAM" onclick="pilihShift('MALAM')">
          🌙 MALAM
          <small>20:00-08:00</small>
        </div>
      </div>
      <div class="info-box" id="info">Pilih shift Anda</div>
      <button class="btn btn-gray" onclick="reset()">← KEMBALI</button>
    </div>
    
    <!-- STEP 3A: ABSEN MASUK (DENGAN FOTO) -->
    <div id="stepMasuk" class="hidden">
      <div class="info">
        <div class="nama" id="dispNama2">-</div>
        <div class="nik" id="dispShift">-</div>
      </div>
      <div class="video-box">
        <video id="video" autoplay playsinline></video>
        <img id="preview" class="preview hidden">
      </div>
      <button id="btnCapture" class="btn btn-primary" onclick="ambilFotoMasuk()">📷 AMBIL FOTO</button>
      <div class="info-box" id="info2"></div>
      <button id="btnMasuk" class="btn btn-masuk" onclick="prosesAbsenMasuk()" disabled>✅ ABSEN MASUK</button>
      <button class="btn btn-gray" onclick="reset()">← KEMBALI</button>
    </div>
    
    <!-- STEP 3B: ABSEN PULANG (DENGAN FOTO - KHUSUS KEDIRI) -->
    <div id="stepPulang" class="hidden">
      <div class="info">
        <div class="nama" id="dispNama3">-</div>
        <div class="nik" id="dispShift2">-</div>
      </div>
      <div class="video-box">
        <video id="videoPulang" autoplay playsinline></video>
        <img id="previewPulang" class="preview hidden">
      </div>
      <button id="btnCapturePulang" class="btn btn-primary" onclick="ambilFotoPulang()">📷 AMBIL FOTO PULANG</button>
      <div class="info-box" id="info3"></div>
      <button id="btnPulang" class="btn btn-pulang" onclick="prosesAbsenPulang()" disabled>🏠 KIRIM ABSEN PULANG</button>
      <button class="btn btn-gray" onclick="reset()">← KEMBALI</button>
    </div>
    
    <!-- BLOCK SCREEN -->
    <div id="blockScreen" class="hidden" style="text-align:center;padding:20px;">
      <div style="font-size:80px;" id="blockIcon">🚫</div>
      <h1 style="color:#dc3545;margin:16px 0;font-size:22px;" id="blockTitle">AKSES DITOLAK</h1>
      <div class="info-box error" id="blockMsg" style="text-align:left;white-space:pre-line;"></div>
      <button class="btn btn-gray" onclick="location.reload()">← KEMBALI</button>
    </div>
    
    <div class="footer-link">
      <a href="register.html">📝 Belum Terdaftar? Daftar di sini</a>
    </div>
  </div>
  
  <script src="config.js"></script>
  <script src="helpers.js"></script>
  <script>
    // ============ VARIABEL GLOBAL ============
    let pegawai = null;
    let shift = null;
    let fotoMasukBase64 = null;
    let fotoPulangBase64 = null;
    let videoStream = null;
    
    // ============ AUTO-FILL NIK TERAKHIR ============
    window.addEventListener('load', () => {
      const last = getLastNIK();
      if (last) document.getElementById('identifier').value = last;
    });
    
    document.getElementById('identifier').addEventListener('keypress', e => {
      if (e.key === 'Enter') cekPegawai();
    });
    
    // ============ STEP 1: CEK PEGAWAI ============
    async function cekPegawai() {
      const id = document.getElementById('identifier').value.trim();
      if (!id) { alert('Isi NIK atau No HP!'); return; }
      
      try {
        const r = await kirimKeServer({ 
          action: 'check_pegawai', 
          identifier: id 
        });
        
        if (r.status === 'success') {
          pegawai = r.data;
          saveLastNIK(id);
          
          document.getElementById('step1').classList.add('hidden');
          document.getElementById('step2').classList.remove('hidden');
          document.getElementById('dispNama').innerText = pegawai.nama;
          document.getElementById('dispNIK').innerText = 'NIK: ' + pegawai.nik + ' • HP: ' + pegawai.noHp;
        } else if (r.blacklisted) {
          showBlock('🚫', 'AKUN DIBLACKLIST', r.message);
        } else if (r.inactive) {
          showBlock('⏸️', 'AKUN TIDAK AKTIF', r.message);
        } else if (r.notRegistered) {
          if (confirm('NIK/HP belum terdaftar.\n\nKlik OK untuk DAFTAR\nKlik CANCEL untuk coba lagi')) {
            location.href = 'register.html';
          }
        } else {
          alert(r.message);
        }
      } catch (err) { 
        alert('Error: ' + err.message); 
      }
    }
    
    // ============ STEP 2: PILIH SHIFT ============
    async function pilihShift(s) {
      shift = s;
      document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-shift="${s}"]`).classList.add('active');
      
      try {
        const r = await kirimKeServer({ 
          action: 'check_session', 
          nik: pegawai.nik 
        });
        
        if (r.hasActiveSession) {
          const jamMasuk = new Date(r.sesi.jamMasuk).toLocaleString('id-ID');
          const konfirm = confirm(
            `📋 SESI AKTIF DITEMUKAN:\n\n` +
            `Shift: ${r.sesi.shift}\n` +
            `Masuk: ${jamMasuk}\n\n` +
            `✅ OK = ABSEN PULANG (dengan foto)\n` +
            `❌ CANCEL = Batal`
          );
          if (konfirm) {
            tampilkanPulang();
          }
        } else {
          const aksi = confirm(
            `Shift ${s} dipilih.\n\n` +
            `✅ OK = ABSEN MASUK (dengan foto)\n` +
            `❌ CANCEL = ABSEN PULANG (jika lupa absen masuk)`
          );
          if (aksi) {
            tampilkanMasuk();
          } else {
            const yakin = confirm('Yakin belum absen masuk?\n\nKlik OK untuk lanjut absen pulang');
            if (yakin) {
              tampilkanPulang();
            }
          }
        }
      } catch (err) { 
        alert('Error: ' + err.message); 
      }
    }
    
    // ============ STEP 3A: TAMPILKAN ABSEN MASUK ============
    async function tampilkanMasuk() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('stepMasuk').classList.remove('hidden');
      document.getElementById('dispNama2').innerText = pegawai.nama;
      document.getElementById('dispShift').innerText = '🕐 Shift: ' + shift;
      
      setInfo(document.getElementById('info2'), '📷 Ambil foto selfie untuk absen masuk');
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
        });
        document.getElementById('video').srcObject = videoStream;
      } catch (err) {
        setInfo(document.getElementById('info2'), '❌ Kamera tidak bisa diakses!', 'error');
      }
    }
    
    // ============ STEP 3B: TAMPILKAN ABSEN PULANG ============
    async function tampilkanPulang() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('stepPulang').classList.remove('hidden');
      document.getElementById('dispNama3').innerText = pegawai.nama;
      document.getElementById('dispShift2').innerText = '🕐 Shift: ' + shift;
      
      setInfo(document.getElementById('info3'), '📷 Ambil foto untuk absen pulang');
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'user', width: { ideal: 640 } }
        });
        document.getElementById('videoPulang').srcObject = videoStream;
      } catch (err) {
        setInfo(document.getElementById('info3'), '❌ Kamera tidak bisa diakses!', 'error');
      }
    }
    
    // ============ AMBIL FOTO MASUK ============
    function ambilFotoMasuk() {
      const video = document.getElementById('video');
      if (!video.srcObject) { alert('Kamera belum siap!'); return; }
      
      setInfo(document.getElementById('info2'), '📍 Mengambil GPS...');
      
      navigator.geolocation.getCurrentPosition(pos => {
        const jarak = Math.round(hitungJarak(
          pos.coords.latitude, pos.coords.longitude,
          CONFIG.KANTOR.lat, CONFIG.KANTOR.lng
        ));
        
        const result = captureFotoDenganMark(video, {
          nama: pegawai.nama,
          jarak: jarak,
          shift: shift
        });
        fotoMasukBase64 = result.base64;
        
        const preview = document.getElementById('preview');
        preview.src = result.dataUrl;
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        
        document.getElementById('btnCapture').innerText = '🔄 AMBIL ULANG';
        document.getElementById('btnMasuk').disabled = false;
        setInfo(document.getElementById('info2'), 
          `✅ Foto siap!\n📏 Jarak: ${jarak}m\nKlik "ABSEN MASUK"`, 'success');
      }, err => {
        setInfo(document.getElementById('info2'), '❌ GPS gagal: ' + err.message, 'error');
      }, { enableHighAccuracy: true, timeout: 15000 });
    }
    
    // ============ AMBIL FOTO PULANG ============
    function ambilFotoPulang() {
      const video = document.getElementById('videoPulang');
      if (!video.srcObject) { alert('Kamera belum siap!'); return; }
      
      setInfo(document.getElementById('info3'), '📍 Mengambil GPS...');
      
      navigator.geolocation.getCurrentPosition(pos => {
        const jarak = Math.round(hitungJarak(
          pos.coords.latitude, pos.coords.longitude,
          CONFIG.KANTOR.lat, CONFIG.KANTOR.lng
        ));
        
        const result = captureFotoDenganMark(video, {
          nama: pegawai.nama + ' (PULANG)',
          jarak: jarak,
          shift: shift
        });
        fotoPulangBase64 = result.base64;
        
        const preview = document.getElementById('previewPulang');
        preview.src = result.dataUrl;
        preview.classList.remove('hidden');
        video.classList.add('hidden');
        
        document.getElementById('btnCapturePulang').innerText = '🔄 AMBIL ULANG';
        document.getElementById('btnPulang').disabled = false;
        setInfo(document.getElementById('info3'), 
          `✅ Foto pulang siap!\n📏 Jarak: ${jarak}m\nKlik "KIRIM ABSEN PULANG"`, 'success');
      }, err => {
        setInfo(document.getElementById('info3'), '❌ GPS gagal: ' + err.message, 'error');
      }, { enableHighAccuracy: true, timeout: 15000 });
    }
    
    // ============ PROSES ABSEN MASUK ============
    async function prosesAbsenMasuk() {
      const infoEl = document.getElementById('info2');
      const btn = document.getElementById('btnMasuk');
      
      if (!fotoMasukBase64) {
        setInfo(infoEl, '❌ Ambil foto dulu!', 'error'); 
        return;
      }
      
      btn.disabled = true;
      const origText = btn.innerText;
      btn.innerText = '⏳ Mengirim...';
      
      try {
        setInfo(infoEl, '📍 Mengambil GPS...');
        const lok = await ambilLokasi();
        const jarak = hitungJarak(lok.lat, lok.lng, CONFIG.KANTOR.lat, CONFIG.KANTOR.lng);
        
        if (jarak > CONFIG.RADIUS_MAX) {
          throw new Error(`Diluar area! Jarak: ${Math.round(jarak)}m (max ${CONFIG.RADIUS_MAX}m)`);
        }
        
        setInfo(infoEl, `📏 Jarak: ${Math.round(jarak)}m\n📤 Mengirim...`);
        
        const payload = {
          action: 'absen_masuk',
          nik: pegawai.nik,
          nama: pegawai.nama,
          shift: shift,
          latitude: lok.lat,
          longitude: lok.lng,
          fotoBase64: fotoMasukBase64
        };
        
        const r = await kirimKeServer(payload);
        
        if (r.status === 'success') {
          setInfo(infoEl, '🎉 ' + r.message, 'success');
          btn.innerText = '✅ SUDAH MASUK';
          
          setTimeout(() => {
            const lanjut = confirm(
              '🎉 Absen masuk berhasil!\n\n' +
              '✅ OK = LANJUT ABSEN PULANG sekarang\n' +
              '❌ CANCEL = Selesai'
            );
            if (lanjut) {
              stopCamera();
              tampilkanPulang();
            } else {
              reset();
            }
          }, 1500);
        } else {
          if (r.blacklisted) {
            showBlock('🚫', 'DIBLACKLIST', r.message);
            return;
          } else if (r.inactive) {
            showBlock('⏸️', 'TIDAK AKTIF', r.message);
            return;
          }
          throw new Error(r.message);
        }
      } catch (err) {
        setInfo(infoEl, '❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerText = origText;
      }
    }
    
    // ============ PROSES ABSEN PULANG (DENGAN FOTO) ============
    async function prosesAbsenPulang() {
      const infoEl = document.getElementById('info3');
      const btn = document.getElementById('btnPulang');
      
      if (!fotoPulangBase64) {
        setInfo(infoEl, '❌ Ambil foto dulu!', 'error');
        return;
      }
      
      btn.disabled = true;
      const origText = btn.innerText;
      btn.innerText = '⏳ Mengirim...';
      
      try {
        setInfo(infoEl, '📍 Mengambil GPS...');
        const lok = await ambilLokasi();
        const jarak = hitungJarak(lok.lat, lok.lng, CONFIG.KANTOR.lat, CONFIG.KANTOR.lng);
        
        if (jarak > CONFIG.RADIUS_MAX) {
          throw new Error(`Diluar area! Jarak: ${Math.round(jarak)}m (max ${CONFIG.RADIUS_MAX}m)`);
        }
        
        setInfo(infoEl, `📏 Jarak: ${Math.round(jarak)}m\n📤 Mengirim...`);
        
        const payload = {
          action: 'absen_pulang',
          nik: pegawai.nik,
          nama: pegawai.nama,
          shift: shift,
          latitude: lok.lat,
          longitude: lok.lng,
          fotoBase64: fotoPulangBase64
        };
        
        const r = await kirimKeServer(payload);
        
        if (r.status === 'success') {
          setInfo(infoEl, '🎉 ' + r.message, 'success');
          btn.innerText = '✅ SUDAH PULANG';
          setTimeout(() => {
            alert('🎉 Absen pulang berhasil! Terima kasih.');
            reset();
          }, 1500);
        } else {
          if (r.blacklisted) {
            showBlock('🚫', 'DIBLACKLIST', r.message);
            return;
          } else if (r.inactive) {
            showBlock('⏸️', 'TIDAK AKTIF', r.message);
            return;
          }
          throw new Error(r.message);
        }
      } catch (err) {
        setInfo(infoEl, '❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerText = origText;
      }
    }
    
    // ============ STOP KAMERA ============
    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
    }
    
    // ============ RESET KE STEP 1 ============
    function reset() {
      stopCamera();
      fotoMasukBase64 = null;
      fotoPulangBase64 = null;
      shift = null;
      pegawai = null;
      
      document.getElementById('stepMasuk').classList.add('hidden');
      document.getElementById('stepPulang').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('blockScreen').classList.add('hidden');
      
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('identifier').value = getLastNIK();
      document.querySelectorAll('.shift-btn').forEach(b => b.classList.remove('active'));
      
      // Reset video masuk
      const video = document.getElementById('video');
      const preview = document.getElementById('preview');
      if (video) video.classList.remove('hidden');
      if (preview) preview.classList.add('hidden');
      const btnCapture = document.getElementById('btnCapture');
      if (btnCapture) btnCapture.innerText = '📷 AMBIL FOTO';
      const btnMasuk = document.getElementById('btnMasuk');
      if (btnMasuk) btnMasuk.disabled = true;
      
      // Reset video pulang
      const videoP = document.getElementById('videoPulang');
      const previewP = document.getElementById('previewPulang');
      if (videoP) videoP.classList.remove('hidden');
      if (previewP) previewP.classList.add('hidden');
      const btnCaptureP = document.getElementById('btnCapturePulang');
      if (btnCaptureP) btnCaptureP.innerText = '📷 AMBIL FOTO PULANG';
      const btnPulang = document.getElementById('btnPulang');
      if (btnPulang) btnPulang.disabled = true;
    }
    
    // ============ TAMPILKAN BLOCK SCREEN ============
    function showBlock(icon, title, msg) {
      stopCamera();
      
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('stepMasuk').classList.add('hidden');
      document.getElementById('stepPulang').classList.add('hidden');
      document.getElementById('blockScreen').classList.remove('hidden');
      
      document.getElementById('blockIcon').innerText = icon;
      document.getElementById('blockTitle').innerText = title;
      document.getElementById('blockMsg').innerText = msg;
    }
  </script>
</body>
</html>
